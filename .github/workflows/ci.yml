name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: node dist/index.js --version
      - name: Pack smoke test
        run: |
          smoke_dir=$(mktemp -d)
          npm pack --cache "$smoke_dir/cache" --pack-destination "$smoke_dir"
          tarball=$(find "$smoke_dir" -maxdepth 1 -name '*.tgz' -print -quit)
          npm install --cache "$smoke_dir/cache" --prefix "$smoke_dir/install" "$tarball"
          "$smoke_dir/install/node_modules/.bin/flue-tui" --version

  demo-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/demo-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npm ci --prefix examples/demo-agent
      - run: E2E=1 pnpm test:e2e
